# [Extensions-扩展]-启用了MkDocs中Material的所有markdown相关功能
## 参考示例 https://squidfunk.github.io/mkdocs-material/setup/extensions/
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

  # Python Markdown Extensions
  ##[Arithmatex]
  - pymdownx.arithmatex: # 允许呈现块和内联块方程
      generic: true
  ##[BetterEm]
  - pymdownx.betterem: # 开启特殊字符强调Markdown中的文本
      smart_enable: all
  ##[Caret, Mark & Tilde]
  # 插入符号、标记和波浪形扩展
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  ##[Critic]
  - pymdownx.critic: # 突出显示文档中添加、删除或更新的部分
      mode: view
  ##[Details]
  - pymdownx.details # 可展开详细说明
  ##[Emoji]
  - pymdownx.emoji: # Emoji扩展-图标/表情符号等
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  ##[Highlight]
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 行号
      #auto_title: true # 编程语言名称
      line_spans: __span # 代码块的每一行都被包装在一个span中
      pygments_lang_class: true # CSS类来标识代码块的语言
  ##[InlineHilite]
  - pymdownx.inlinehilite # 增加了对内联代码块语法高亮显示的支持
  ##[Keys]
  - pymdownx.keys # 允许键盘键和组合的呈现
  ##[SmartSymbols]
  - pymdownx.smartsymbols # 字符序列转换为相应的符号，例如版权符号或分数
  ##[Snippets]
  - pymdownx.snippets # 将任意文件中的内容嵌入文档(包括其他文档或源文件)的功能
  ##[SuperFences]
  - pymdownx.superfences: # 允许任意嵌套代码和内容块，包括警告、选项卡、列表和所有其他元素
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  ##[Tabbed]
  - pymdownx.tabbed:
      alternate_style: true # 允许使用内容选项卡
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  ##[Tasklist]
  - pymdownx.tasklist:
      custom_checkbox: true # 允许使用GitHub风味Markdown启发的任务列表，遵循相同的语法约定
  ##[Arithmatex]
  - pymdownx.arithmatex: # MathJax1数学公式支持
      generic: true

# [Extra Configuration-样式]
extra_javascript:
