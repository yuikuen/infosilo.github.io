# [Info-信息]
site_name: Yuen's Info Silo            # 网站名字
site_url: http://47.113.102.164:8000   # 网站地址
site_author: Mr.Yuen                   # 作者名字
site_description: >-                   # 项目描述
  mó dāo bú wù kǎn chái gōng

# [Theme-主题]
theme:
  name: material                       # 主题名称
  custom_dir: overrides                # 主题自定义目录,定制文件会覆盖主题默认文件

  ## [Colors-调色]
  palette:
    # 单色系
    #primary: light blue               # 顶部栏目颜色
    #accent: light green               # 强调色,链接/标题等

    # 自动切换模式
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto # 切换图标
        name: Switch to light mode     # 悬浮提示语
    - media: "(prefers-color-scheme: light)"
      scheme: default                  # 日间模式
      primary: indigo                  # 日间颜色
      accent: cyan                     # 强调色,链接/标题等可交互元件的高亮色
      toggle:
        icon: material/brightness-7    # 日间图标
        name: Switch to dark mode      # 悬浮提示语
    - media: "(prefers-color-scheme: dark)"
      scheme: slate                    # 夜间模式
      primary: black                   # 夜间颜色
      accent: deep purple              # 强调色,链接/标题等可交互元件的高亮色
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  ## [Font-字体]
  font:
    text: Roboto
    code: Roboto Mono
  
  ## [Language-语言]
  language: en                         # 默认语言(标题/提示语等)

  ## [Logo/Icons-图标]
  # 注意logo/favicon文件必须在docs目录下,另可用链接代替
  logo: img/logo.png                   # 网站Logo,左上角Logo图片
  #logo: https://cdn0.iconfinder.com/data/icons/essential-pack-4/512/11-2-1024.png
  favicon: img/favicon.png             # 网站图标,浏览器菜单栏上显示
  #favicon: https://cdn1.iconfinder.com/data/icons/gestureworks_gesture_glyphs/512/stroke_letter_y_lowercase_gestureworks.png

  # icon更多参考 https://squidfunk.github.io/mkdocs-material/setup/changing-the-logo-and-icons/#site-icons
  icon:                                     # 主题图标,网站大多数图标都可更改,如页脚中的导航箭头
    previous: fontawesome/solid/angles-left # 页脚导航图标,上一页
    next: fontawesome/solid/angles-right    # 页脚导航图标,下一页
    edit: material/pencil                   # 文章编辑图标,对应features参数
    view: material/eye                      # 文章查看图标,对应features参数
    repo: fontawesome/brands/github         # 右上角Git仓库图标
    tag:                                    # 自定义标签标志
      html: fontawesome/brands/html5
      js: fontawesome/brands/js
      css:  fontawesome/brands/css3
    admonition:                             # 自定义警告标志
      tip: fontawesome/solid/bullhorn

  ## [Features-功能] md文章与此功能相呼应
  ## 具体介绍 https://squidfunk.github.io/mkdocs-material/blog/2021/12/27/the-past-present-and-future/?h=features#the-past-present-and-future
  features:
    ###[navigation-导航]
    #- navigation.instant         # 瞬间加载,多语言切换会导致跳回首页
    - navigation.instant.prefetch # 预先加载
    - navigation.instant.progress # 进度显示
    - navigation.tracking         # 锚点跟踪(地址栏中的URL会自动更新为目录中突出显示的活动锚点)
    - navigation.tabs             # 顶部菜单(顶级索引被作为Tab)
    - navigation.tabs.sticky      # 顶部菜单始终可见(Tab滚动始终可见)
    - navigation.sections         # 侧边栏中以组的形式呈现
    - navigation.expand           # 侧边栏展开,默认展开导航栏
    - navigation.path             # 页面标题上方呈现具体导航路径
    #- navigation.prune           # 仅显示只构建导航树的可见部分
    - navigation.indexes          # 启用节索引页后,可以将文档直接附加到节
    - navigation.top              # 滚动显示返回顶部按钮
    - toc.follow                  # 目录跟踪-页面右侧小目录
    #- toc.integrate              # 目录跟踪-页面左侧大目录

    ###[Search-搜索]-需启用plugins.search插件
    - search.suggest              # 搜索建议
    - search.highlight            # 搜索高亮显示
    - search.share                # 搜索分享按钮

    ###[Header-页眉]
    - header.autohide             # 自动隐藏
    - announce.dismiss            # 取消临时公告

    ###[Footer-页脚]
    - navigation.footer           # 底部导航栏

    ###[Repository-仓库]-支持两种类型的代码操作:编辑和查看
    - content.action.edit
    - content.action.view

    ###[Code-代码]
    #- content.tabs.link
    - content.code.copy
    - content.code.select
    - content.code.annotate

    - content.tooltips
    - content.footnote.tooltips   # 脚注呈现

# [Plugins-插件]
plugins:
  - search:
      # 搜索索引时精确控制
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - offline # 内置的离线插件确保网站搜索工作
  #- social # 社交名片
  # 压缩插件
  - minify:
      minify_html: true
  #- blog # 博客插件 更多配置说明 https://squidfunk.github.io/mkdocs-material/plugins/blog/
  #- rss  # 订阅插件 更多配置说明 https://squidfunk.github.io/mkdocs-material/setup/setting-up-a-blog/#rss
  - tags: # 标签插件 更多配置说明 https://squidfunk.github.io/mkdocs-material/setup/setting-up-tags/#setting-up-tags
      tags_file: tags.md
  
  # 可参考官网每页MD底部显示
  # 需要安装 pip install mkdocs-git-revision-date-localized-plugin
  - git-revision-date-localized: # 页面底部增加更新时间
      enabled: !ENV [CI, false]  # 关闭
      type: iso_date
      enable_creation_date: true
      fallback_to_build_date: true
      exclude:                   # 排除以下文章
        - index.md
  # 需要安装 pip install mkdocs-git-committers-plugin-2
  - git-committers:              # 呈现贡献者的GitHub头像
      enabled: !ENV [CI, false]  # 关闭
      repository: yuikuen/infosilo.github.io
      branch: main
      exclude:                   # 排除以下文章
        - index.md

  # mkdocs-static-i18n 多语言翻译插件,https://github.com/ultrabug/mkdocs-static-i18n
  ## 插件通过识别md文件的后缀来识别,如filename.zh.md/filename.en.md
  ## 官方作者并不认同此方式,建议通过目录方式区分,并且翻译后字样式会有所不一致的问题
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: Chinese
          build: true
          nav_translations: # 注意,导航栏中所有需要翻译的标题和副标题都可以放在这里，但不能缩进
            Home: 首页
            About: 关于
            Note: 笔记
            Tags: 标签
            # 参考例子
            Web Site: 网站
            Hugo on Ubuntu: Ubuntu 部署 Hugo
            Docker deploys MkDocs: 使用 Docker 部署 MkDocs
        #- locale: zh-Hant
        #  name: Chinese(Traditional)
        #  build: true
        #  nav_translations:
        #    Home: 首頁
        #    Note: 筆記
        #    About: 關於

# [Extra-额外]
extra:
  # 官方多语言切换功能,对应[Theme.Language]功能,另外多语言翻译通过目录文件来判断
  ## 因使用了外部插件plugins.i18n,此处注释掉
  #alternate:
  #  - name: English
  #    link: /en/
  #    lang: en
  #  - name: Chinese
  #    link: /zh/
  #    lang: zh
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    # [Google Analytics-谷歌分析]
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
    # [Feedback-每篇页面底部反馈]
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target="_blank" rel="noopener">feedback form</a>.
          # using our <a href="https://marketingplatform.google.com/about/analytics/" target="_blank" rel="noopener">feedback form</a>.
  # [Privacy-Cookie同意解决方案]
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

  # [页脚-社交链接]
  social:
    # 图标使用官方内置的
    ## 具体icon可通过https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/#search查找
    #- icon: fontawesome/solid/house
    - icon: fontawesome/brands/github
      link: https://github.com/yuikuen
      name: GitHub
    #- icon: fontawesome/brands/gitlab
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/yuikuen
    - icon: fontawesome/regular/envelope
      link: mailto:<yuikuen.yuen@gmail.com>
      name: Email
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/YuikuenY
      name: Twitter
    - icon: fontawesome/brands/weixin
      link: img/WeChat.jpg
    - icon: fontawesome/brands/qq
      link: img/QQ.jpg
      name: QQ
  tags:
    HTML5: html
    JavaScript: js
    CSS: css
  # [页脚-左下角是否保留"Material for MkDocs"]
  generator: true

# [Git Repository-右上角仓库信息] 
edit_uri: edit/main/docs/ # 定义URL指向一个有效的子文件目录
repo_name: yuikuen/infosilo.github.io # 右上角仓库名字&地址
repo_url: https://github.com/yuikuen/infosilo.github.io.git

